<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | LearnHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="flex items-center">
                        <i data-lucide="graduation-cap" class="h-8 w-8 text-blue-600 mr-2"></i>
                        <span class="text-2xl font-bold text-gray-900">LearnHub</span>
                    </a>
                    <div class="hidden md:ml-10 md:flex space-x-8">
                        <a href="index.html" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">Home</a>
                        <a href="#" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">Categories</a>
                        <a href="collaborations.html" class="text-gray-500 hover:text-blue-600 px-3 py-2 text-sm font-medium transition-colors">Project Collaborations</a>
                    </div>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <div id="user-profile-menu" class="relative hidden">
                        <button id="profileAvatarBtn" class="flex items-center focus:outline-none">
                            <span class="inline-block w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
                                <i data-lucide="user" class="h-5 w-5 text-blue-600"></i>
                            </span>
                        </button>
                        <div id="profileDropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-2 z-50 hidden">
                            <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Profile</a>
                            <button id="logoutBtn" class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">Logout</button>
                        </div>
                    </div>
                    <a href="login.html" id="loginNavBtn" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Login</a>
                    <a href="signup.html" id="signupNavBtn" class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Sign Up</a>
                </div>
                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                        <i data-lucide="menu" class="h-6 w-6"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile menu -->
        <div id="mobile-menu" class="md:hidden hidden bg-white border-t border-gray-200">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="index.html" class="text-gray-500 hover:text-gray-700 block px-3 py-2 text-base font-medium">Home</a>
                <a href="#" class="text-gray-500 hover:text-gray-700 block px-3 py-2 text-base font-medium">Categories</a>
                <a href="collaborations.html" class="text-gray-500 hover:text-gray-700 block px-3 py-2 text-base font-medium">Project Collaborations</a>
                <a href="login.html" class="text-gray-500 hover:text-gray-700 block px-3 py-2 text-base font-medium">Login</a>
                <a href="signup.html" class="text-gray-900 bg-gray-100 block px-3 py-2 rounded text-base font-medium">Sign Up</a>
            </div>
        </div>
    </nav>
    <main class="max-w-2xl mx-auto mt-10 bg-white rounded-xl shadow-md p-8">
        <div class="flex items-center space-x-6 mb-6">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center">
                <i data-lucide="user" class="h-10 w-10 text-blue-600"></i>
            </div>
            <div>
                <h2 id="profile-name" class="text-2xl font-bold text-gray-900">Loading...</h2>
                <p id="profile-username" class="text-gray-500">@username</p>
            </div>
        </div>
        <div>
            <h3 class="text-lg font-semibold mb-2">Bio</h3>
            <p id="profile-bio" class="text-gray-700">Loading bio...</p>
        </div>
    </main>
    <script src="script.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        // Supabase client setup (if not already set)
        const SUPABASE_URL = 'https://hsaxexgydtaeuzbnkezh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzYXhleGd5ZHRhZXV6Ym5rZXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU5NTc2MDMsImV4cCI6MjA3MTUzMzYwM30.STUv9traF7co1P9nd1AHhFaJ3fOKPhytZdvqFqv99SU';
        const supabase = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

        if (supabase) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            // Fetch profile from Supabase 'profiles' table
            const { data: profile, error } = await supabase
                .from('profiles')
                .select('full_name, username, bio')
                .eq('id', user.id)
                .single();
            if (!error && profile) {
                document.getElementById('profile-name').textContent = profile.full_name || 'No Name';
                document.getElementById('profile-username').textContent = '@' + (profile.username || 'username');
                document.getElementById('profile-bio').textContent = profile.bio || 'No bio provided.';
            } else {
                document.getElementById('profile-name').textContent = 'No Name';
                document.getElementById('profile-username').textContent = '@username';
                document.getElementById('profile-bio').textContent = 'No bio provided.';
            }
        }

        // Logout button logic
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn && supabase) {
            logoutBtn.addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = 'login.html';
            });
        }
        lucide.createIcons();
    });
    </script>
</body>
</html>
