<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | LearnHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .card { @apply bg-white rounded-xl shadow-md p-6; }
    .table { @apply w-full text-left border-collapse; }
    .table th, .table td { @apply px-4 py-2 border-b; }
    .table th { @apply bg-gray-100; }
  </style>
</head>
<body class="bg-gray-50">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
      <a href="index.html" class="flex items-center">
        <i data-lucide="graduation-cap" class="h-8 w-8 text-blue-600 mr-2"></i>
        <span class="text-2xl font-bold text-gray-900">LearnHub Admin</span>
      </a>
      <div class="hidden md:flex items-center space-x-4">
        <div id="user-profile-menu" class="relative hidden">
          <button id="profileAvatarBtn" class="flex items-center focus:outline-none">
            <span class="inline-block w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center">
              <i data-lucide="user" class="h-5 w-5 text-blue-600"></i>
            </span>
          </button>
          <div id="profileDropdown" class="absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-2 z-50 hidden">
            <a href="profile.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Profile</a>
            <button id="logoutBtn" class="block w-full text-left px-4 py-2 text-red-600 hover:bg-gray-100">Logout</button>
          </div>
        </div>
        <a href="login.html" id="loginNavBtn" class="text-gray-500 hover:text-gray-700 px-3 py-2 text-sm font-medium">Login</a>
        <a href="signup.html" id="signupNavBtn" class="bg-gray-900 hover:bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Sign Up</a>
      </div>
    </div>
  </nav>
  <main class="max-w-7xl mx-auto mt-8 grid grid-cols-1 md:grid-cols-4 gap-8">
    <!-- Sidebar -->
    <aside class="md:col-span-1">
      <div class="card mb-6">
        <h3 class="text-lg font-semibold mb-4">Admin Menu</h3>
        <ul class="space-y-2">
          <li><button class="w-full text-left px-3 py-2 rounded hover:bg-blue-50" onclick="showPanel('dashboard')">Dashboard</button></li>
          <li><button class="w-full text-left px-3 py-2 rounded hover:bg-blue-50" onclick="showPanel('categories')">Categories</button></li>
          <li><button class="w-full text-left px-3 py-2 rounded hover:bg-blue-50" onclick="showPanel('subcategories')">Sub-categories</button></li>
          <li><button class="w-full text-left px-3 py-2 rounded hover:bg-blue-50" onclick="showPanel('users')">Users</button></li>
          <li><button class="w-full text-left px-3 py-2 rounded hover:bg-blue-50" onclick="showPanel('posts')">Posts</button></li>
        </ul>
      </div>
      <div class="card">
        <input id="admin-search" type="text" placeholder="Search..." class="w-full px-3 py-2 border rounded-lg" oninput="handleSearch()">
      </div>
    </aside>
    <!-- Main Content -->
    <section class="md:col-span-3 space-y-8">
      <!-- Dashboard Panel -->
      <div id="panel-dashboard" class="card">
        <h2 class="text-xl font-bold mb-4">Dashboard</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="bg-blue-100 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold" id="total-users">0</div>
            <div class="text-gray-600">Users</div>
          </div>
          <div class="bg-green-100 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold" id="total-categories">0</div>
            <div class="text-gray-600">Categories</div>
          </div>
          <div class="bg-purple-100 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold" id="total-subcategories">0</div>
            <div class="text-gray-600">Sub-categories</div>
          </div>
          <div class="bg-yellow-100 rounded-lg p-4 text-center">
            <div class="text-2xl font-bold" id="total-posts">0</div>
            <div class="text-gray-600">Posts</div>
          </div>
        </div>
      </div>
      <!-- Categories Panel -->
      <div id="panel-categories" class="card hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Categories</h2>
          <button onclick="showCategoryModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Add Category</button>
        </div>
        <table class="table" id="categories-table">
          <thead><tr><th>Name</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- Subcategories Panel -->
      <div id="panel-subcategories" class="card hidden">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold">Sub-categories</h2>
          <button onclick="showSubcategoryModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">Add Sub-category</button>
        </div>
        <table class="table" id="subcategories-table">
          <thead><tr><th>Name</th><th>Category</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- Users Panel -->
      <div id="panel-users" class="card hidden">
        <h2 class="text-xl font-bold mb-4">Users</h2>
        <table class="table" id="users-table">
          <thead><tr><th>Email</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <!-- Posts Panel -->
      <div id="panel-posts" class="card hidden">
        <h2 class="text-xl font-bold mb-4">Posts</h2>
        <table class="table" id="posts-table">
          <thead><tr><th>Title</th><th>Author</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>
  <!-- Modals for Add/Edit Category/Subcategory -->
  <div id="category-modal" class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h3 class="text-lg font-bold mb-4" id="category-modal-title">Add Category</h3>
      <input id="category-name-input" type="text" class="w-full px-3 py-2 border rounded mb-4" placeholder="Category Name">
      <div class="flex justify-end space-x-2">
        <button onclick="hideCategoryModal()" class="px-4 py-2 rounded bg-gray-200">Cancel</button>
        <button id="save-category-btn" class="px-4 py-2 rounded bg-blue-600 text-white">Save</button>
      </div>
    </div>
  </div>
  <div id="subcategory-modal" class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
      <h3 class="text-lg font-bold mb-4" id="subcategory-modal-title">Add Sub-category</h3>
      <input id="subcategory-name-input" type="text" class="w-full px-3 py-2 border rounded mb-4" placeholder="Sub-category Name">
      <select id="subcategory-category-select" class="w-full px-3 py-2 border rounded mb-4"></select>
      <div class="flex justify-end space-x-2">
        <button onclick="hideSubcategoryModal()" class="px-4 py-2 rounded bg-gray-200">Cancel</button>
        <button id="save-subcategory-btn" class="px-4 py-2 rounded bg-blue-600 text-white">Save</button>
      </div>
    </div>
  </div>
  <script src="AdminPanel.js"></script>
</body>
</html>
